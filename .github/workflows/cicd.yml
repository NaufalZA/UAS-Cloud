name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ────────────────────────────────────────────────
# ENV yang digunakan di seluruh workflow
# ────────────────────────────────────────────────
env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_BACKEND:    ${{ secrets.DOCKER_HUB_USERNAME }}/uascloud-backend
  IMAGE_FRONTEND:   ${{ secrets.DOCKER_HUB_USERNAME }}/uascloud-frontend
  IMAGE_AI_SERVICE: ${{ secrets.DOCKER_HUB_USERNAME }}/uascloud-ai-service

jobs:
  # ════════════════════════════════════════════════
  # JOB 1: CI — Build semua Docker images
  # ════════════════════════════════════════════════
  build:
    name: 🔨 Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 🏗️ Build & Push — backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build & Push — frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build & Push — ai-service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_AI_SERVICE }}:latest
            ${{ env.IMAGE_AI_SERVICE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════
  # JOB 2: CD — Deploy backend ke GKE (Google Cloud)
  # Hanya jalan saat push ke main/master (bukan PR)
  # ════════════════════════════════════════════════
  deploy-backend:
    name: 🚀 Deploy Backend ke GKE
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔑 Authenticate ke Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: ☸️ Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location:     ${{ secrets.GKE_CLUSTER_ZONE }}

      - name: 🔐 Buat/update K8s Secret dari GitHub Secrets
        run: |
          kubectl create secret generic backend-secret \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=R2_ACCOUNT_ID="${{ secrets.R2_ACCOUNT_ID }}" \
            --from-literal=R2_ACCESS_KEY="${{ secrets.R2_ACCESS_KEY }}" \
            --from-literal=R2_SECRET_KEY="${{ secrets.R2_SECRET_KEY }}" \
            --from-literal=R2_BUCKET_NAME="${{ secrets.R2_BUCKET_NAME }}" \
            --from-literal=R2_PUBLIC_URL="${{ secrets.R2_PUBLIC_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: 📋 Apply ConfigMap & Manifests
        run: |
          kubectl apply -f k8s/backend-configmap.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/backend-hpa.yaml

      - name: 🖼️ Update image ke versi terbaru
        run: |
          kubectl set image deployment/uascloud-backend \
            backend=${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: ⏳ Tunggu rollout selesai
        run: |
          kubectl rollout status deployment/uascloud-backend --timeout=120s

      - name: 📊 Status akhir
        run: |
          echo "✅ Deploy selesai!"
          kubectl get pods -l app=uascloud-backend
          kubectl get service uascloud-backend-service


