version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: nops_admin
      POSTGRES_PASSWORD: NopsPassword123!
      POSTGRES_DB: nops_db
    ports:
      - "5432:5432"
    volumes:
      - nops_pgdata:/var/lib/postgresql/data

volumes:
  nops_pgdata: